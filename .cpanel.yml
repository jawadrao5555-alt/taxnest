---
deployment:
  tasks:
    - export DEPLOYPATH=/home/$USER/public_html/
    - /bin/cp -R . $DEPLOYPATH
    - cd $DEPLOYPATH
    - /usr/local/bin/php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction 2>&1 || true
    - /usr/local/bin/php artisan config:cache 2>&1
    - /usr/local/bin/php artisan route:cache 2>&1
    - /usr/local/bin/php artisan view:cache 2>&1
    - /usr/local/bin/php artisan storage:link 2>&1 || true
    - /usr/local/bin/php artisan migrate --force 2>&1 || true
    - chmod -R 775 storage bootstrap/cache 2>&1
